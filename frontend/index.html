    <!DOCTYPE html>
    <html lang="it">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Rione AI - Chat Senza Restrizioni</title>
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #fff; height: 100vh; display: flex; flex-direction: column; }
            header { background: #1a1a1a; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
            .logo { font-size: 20px; font-weight: bold; }
            .chat-container { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
            .message { margin-bottom: 15px; padding: 12px; border-radius: 8px; max-width: 70%; }
            .user { background: #333; margin-left: auto; }
            .assistant { background: #2a2a2a; margin-right: auto; }
            .input-area { background: #1a1a1a; padding: 15px; border-top: 1px solid #333; }
            .input-wrapper { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; }
            input { flex: 1; background: #333; border: none; padding: 12px; border-radius: 8px; color: #fff; font-size: 16px; }
            button { background: #6366f1; color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
            button:hover { background: #4f46e5; }
            .typing { color: #888; font-style: italic; }
        </style>
    </head>
    <body>
        <header>
            <div class="logo">Rione AI</div>
            <div style="color: #888;">Senza Restrizioni</div>
        </header>
        <div class="chat-container" id="chat">
            <div class="message assistant">
                Ciao! Sono Rione AI, il tuo chatbot senza restrizioni. Come posso aiutarti oggi?
            </div>
        </div>
        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="messageInput" placeholder="Scrivi il tuo messaggio..." autocomplete="off">
                <button onclick="sendMessage()">Invia</button>
            </div>
        </div>

        <script>
            let sessionId = localStorage.getItem('rione_session_id') || 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('rione_session_id', sessionId);
            const chatDiv = document.getElementById('chat');
            const input = document.getElementById('messageInput');
            input.focus();

            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

            async function sendMessage() {
                const message = input.value.trim();
                if (!message) return;
                addMessage('user', message);
                input.value = '';
                input.disabled = true;

                const typingDiv = document.createElement('div');
                typingDiv.className = 'message assistant typing';
                typingDiv.textContent = 'Sto pensando...';
                chatDiv.appendChild(typingDiv);
                chatDiv.scrollTop = chatDiv.scrollHeight;

                try {
                    const response = await fetch('http://localhost:8000/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: sessionId, message: message, history: [] })
                    });

                    if (!response.ok) throw new Error('Errore del server');
                    typingDiv.remove();

                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    const aiMessageDiv = document.createElement('div');
                    aiMessageDiv.className = 'message assistant';
                    chatDiv.appendChild(aiMessageDiv);

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        aiMessageDiv.textContent += decoder.decode(value);
                        chatDiv.scrollTop = chatDiv.scrollHeight;
                    }
                } catch (error) {
                    typingDiv.remove();
                    addMessage('assistant', Errore: ${error.message});
                } finally {
                    input.disabled = false;
                    input.focus();
                }
            }

            function addMessage(role, content) {
                const msgDiv = document.createElement('div');
                msgDiv.className = message ${role};
                msgDiv.textContent = content;
                chatDiv.appendChild(msgDiv);
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        </script>
    </body>
    </html>
